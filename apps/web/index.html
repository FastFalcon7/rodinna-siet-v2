<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <!-- Nočný režim pred prvým paint-om (žiadny flash) — voľba v časti Viac. -->
    <script>
      try {
        var m = localStorage.getItem('rs-theme');
        var dark = m === 'dark' || (m !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      } catch (e) {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <!-- PWA/manifest: potrebné pre Add-to-Home-Screen; iOS ≥16.4 vyžaduje
         nainštalovanú PWA pre Web Push (lock screen notifikácie). -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Naša rodina" />
    <title>Naša rodina</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
