# ── Rodinná Sieť v2 — base compose (produkcia na Synology DS925+) ─────────────
# NAS:  docker compose --profile edge up -d --build
# Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#       (dev override pridá vite, watch a vystavené porty; caddy sa nespustí,
#        lebo je v profile "edge")
name: rodinna

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rodinna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rodinna}
      POSTGRES_DB: ${POSTGRES_DB:-rodinna}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rodinna} -d ${POSTGRES_DB:-rodinna}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3000
      DOMAIN: ${DOMAIN:-localhost}
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-rodinna}:${POSTGRES_PASSWORD:-rodinna}@postgres:5432/${POSTGRES_DB:-rodinna}
      MEDIA_PATH: /data/media
      MAX_IMAGE_MB: ${MAX_IMAGE_MB:-50}
    volumes:
      # Nahrané súbory. Na NAS nastav MEDIA_HOST_PATH=/volume1/rodinna/media v .env.
      - ${MEDIA_HOST_PATH:-./media}:/data/media
    depends_on:
      postgres:
        condition: service_healthy

  # Web + reverse proxy pre /api, /ws. Beží len s `--profile edge` (NAS).
  # TLS a doménové routovanie rieši zdieľaná NAS-wide edge vrstva (mimo tohto
  # repa) — preto sa nepublishujú host porty, len pripojenie do siete `edge`.
  # Postup: docs/SYNOLOGY_DOMAIN_ACTIVATION.md.
  caddy:
    profiles: ['edge']
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    networks:
      default: {}
      edge:
        aliases: [rodinna-web]
    depends_on:
      - api

networks:
  edge:
    external: true

volumes:
  postgres-data:
